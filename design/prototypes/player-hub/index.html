<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LT AI Coach — Player Hub Prototype</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="prototype" id="prototype" data-mode="reading">
    <nav class="rail" aria-label="Prototype navigation">
      <strong class="mark">LT</strong>
      <button class="rail-btn active" aria-label="Player Hub">P</button>
      <button class="rail-btn" aria-label="Tier list">T</button>
      <button class="rail-btn" aria-label="Draft">D</button>
      <span class="rail-spacer"></span>
      <button class="rail-btn" id="themeButton" aria-label="Toggle theme">◐</button>
    </nav>

    <header class="appbar">
      <div><span class="eyebrow">LT AI COACH</span><h1>Player Hub</h1></div>
      <div class="mode-readout"><span id="modeName">Reading</span><i></i><span>automatic context</span></div>
      <div class="appbar-actions">
        <label><input id="lockLayout" type="checkbox" /> lock layout</label>
        <label><input id="reduceMotion" type="checkbox" /> reduce motion</label>
      </div>
    </header>

    <aside class="roster region" aria-label="Roster">
      <header class="region-head"><div><span class="eyebrow">ROSTER</span><strong id="rosterCount">8 players</strong></div><button class="filter-toggle" id="filterToggle" aria-label="Toggle filters">≡</button></header>
      <div class="filters" id="filters">
        <label class="search"><span>⌕</span><input id="rosterSearch" type="search" placeholder="Search player, team, role" /></label>
        <div class="role-chips" id="roleChips">
          <button class="active" data-role="all">All</button><button data-role="top">Top</button><button data-role="jungle">Jungle</button><button data-role="mid">Mid</button><button data-role="bot">Bot</button><button data-role="support">Support</button>
        </div>
        <div class="filter-pair"><select id="teamFilter"><option value="all">All teams</option><option>Free agent</option><option>Blue Otter</option><option>LOUD</option><option>7REX</option></select><button id="contractToggle">All contracts</button></div>
      </div>
      <div class="roster-list" id="rosterList" role="listbox" aria-label="Players"></div>
      <div class="peek-card" id="peekCard" aria-live="polite"></div>
    </aside>

    <main class="workspace">
      <section class="identity region" id="identity"></section>
      <section class="stats region" id="stats"></section>
      <section class="pool region" id="pool">
        <header class="pool-head">
          <div><span class="eyebrow">CHAMPION POOL</span><strong id="poolSummary"></strong></div>
          <label class="search pool-search"><span>⌕</span><input id="poolSearch" type="search" placeholder="Search champion" /></label>
          <div class="floor-control" id="floorControl"><button class="active" data-floor="0">All</button><button data-floor="70">70+</button><button data-floor="80">80+</button><button data-floor="90">90+</button></div>
        </header>
        <div class="pool-bands" id="poolBands"></div>
      </section>
      <section class="compare region" id="compare"></section>
      <section class="scan region" id="scan"></section>
    </main>

    <aside class="pin-tray" id="pinTray"><span class="eyebrow">PINNED</span><div id="pins"></div></aside>
    <div class="radial" id="radial" hidden></div>
    <button class="light-thumb" id="lightThumb"><span>LIGHT</span><b>Reading</b><i></i></button>
  </div>
  <script type="module" src="./prototype.js"></script>
</body>
</html>
